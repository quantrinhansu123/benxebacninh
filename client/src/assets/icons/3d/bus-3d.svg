<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="busBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="busShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <filter id="busDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#1E40AF" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Shadow -->
  <rect x="10" y="16" width="44" height="36" rx="6" fill="url(#busShadow)" transform="translate(2, 4)" opacity="0.4"/>
  <!-- Main body -->
  <rect x="8" y="12" width="48" height="40" rx="6" fill="url(#busBg)" filter="url(#busDrop)"/>
  <!-- Top section -->
  <rect x="8" y="12" width="48" height="14" rx="6" fill="#1D4ED8"/>
  <!-- Highlight -->
  <path d="M8 18a6 6 0 016-6h36a6 6 0 016 6v2H8v-2z" fill="white" opacity="0.3"/>
  <!-- Windows -->
  <rect x="14" y="28" width="10" height="10" rx="2" fill="white" opacity="0.95"/>
  <rect x="27" y="28" width="10" height="10" rx="2" fill="white" opacity="0.95"/>
  <rect x="40" y="28" width="10" height="10" rx="2" fill="white" opacity="0.95"/>
  <!-- Front sign -->
  <rect x="20" y="16" width="24" height="6" rx="2" fill="white" opacity="0.9"/>
  <!-- Wheels -->
  <circle cx="18" cy="52" r="5" fill="#1E40AF"/>
  <circle cx="18" cy="52" r="2.5" fill="#60A5FA"/>
  <circle cx="46" cy="52" r="5" fill="#1E40AF"/>
  <circle cx="46" cy="52" r="2.5" fill="#60A5FA"/>
  <!-- Door -->
  <rect x="14" y="42" width="8" height="8" rx="1" fill="#1D4ED8"/>
  <rect x="14" y="42" width="8" height="4" rx="1" fill="white" opacity="0.5"/>
</svg>
