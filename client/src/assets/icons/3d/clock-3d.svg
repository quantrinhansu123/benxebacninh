<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="clockBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="clockShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
    <filter id="clockDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#92400E" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Shadow -->
  <circle cx="34" cy="36" r="22" fill="url(#clockShadow)" opacity="0.4"/>
  <!-- Main circle -->
  <circle cx="32" cy="32" r="22" fill="url(#clockBg)" filter="url(#clockDrop)"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="18" fill="white" opacity="0.2"/>
  <!-- Clock face -->
  <circle cx="32" cy="32" r="16" fill="white" opacity="0.95"/>
  <!-- Hour marks -->
  <rect x="31" y="18" width="2" height="4" rx="1" fill="#F59E0B"/>
  <rect x="31" y="42" width="2" height="4" rx="1" fill="#F59E0B"/>
  <rect x="42" y="31" width="4" height="2" rx="1" fill="#F59E0B"/>
  <rect x="18" y="31" width="4" height="2" rx="1" fill="#F59E0B"/>
  <!-- Hour hand -->
  <rect x="31" y="24" width="2" height="10" rx="1" fill="#D97706" transform="rotate(30, 32, 32)"/>
  <!-- Minute hand -->
  <rect x="31" y="20" width="1.5" height="14" rx="0.75" fill="#92400E" transform="rotate(-45, 32, 32)"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#92400E"/>
</svg>
