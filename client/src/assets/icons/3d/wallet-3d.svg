<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="walletBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="walletShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <filter id="walletDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#5B21B6" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Shadow -->
  <rect x="10" y="22" width="44" height="28" rx="6" fill="url(#walletShadow)" transform="translate(2, 4)" opacity="0.4"/>
  <!-- Main wallet -->
  <rect x="8" y="18" width="48" height="32" rx="6" fill="url(#walletBg)" filter="url(#walletDrop)"/>
  <!-- Top flap shadow -->
  <path d="M8 24a6 6 0 016-6h36a6 6 0 016 6v4H8v-4z" fill="#6D28D9"/>
  <!-- Highlight -->
  <path d="M8 24a6 6 0 016-6h36a6 6 0 016 6v2H8v-2z" fill="white" opacity="0.3"/>
  <!-- Card slot -->
  <rect x="40" y="30" width="16" height="12" rx="3" fill="white" opacity="0.95"/>
  <!-- Card slot inner -->
  <circle cx="48" cy="36" r="3" fill="#8B5CF6"/>
  <!-- Money hint lines -->
  <rect x="14" y="32" width="18" height="2" rx="1" fill="white" opacity="0.4"/>
  <rect x="14" y="38" width="14" height="2" rx="1" fill="white" opacity="0.3"/>
</svg>
